name: Now On Tap Pipeline

on:
  schedule:
    - cron: '0 1 * * *'   # 毎日 JST 10:00 (UTC 01:00)
  workflow_dispatch:        # GitHub UI から手動実行

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Write session.json
        run: echo '${{ secrets.INSTAGRAM_SESSION_JSON }}' > data/session.json

      - name: Run pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL:    ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node pipeline.js

      - name: Trigger Cloudflare deploy
        run: curl -s -o /dev/null -w "%{http_code}" -d "" "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
